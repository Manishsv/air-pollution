# AirOS Driver Registry
# ======================
# Controls which domain drivers are active in this deployment.
#
# DISCOVERY:
#   The driver loader discovers drivers in two ways:
#     1. Built-in (in-tree) drivers listed under "drivers:" below.
#        These use the "builtin_class" key to locate the driver class.
#     2. Third-party drivers installed as Python packages that declare
#        the "airos.drivers" entry point group.
#        These use the "package" key for documentation purposes.
#
# TRUST:
#   Only drivers with "trusted: true" are loaded. Drivers discovered via
#   entry points but absent from this file are quarantined with a warning.
#   Set "trusted: false" to temporarily disable a driver without uninstalling.
#
# TRUST LEVELS:
#   core     — shipped with AirOS Core, reviewed by maintainers
#   verified — third-party, manually vetted, pinned to a version range
#   local    — operator-built, not published to PyPI
#
# ADDING A THIRD-PARTY DRIVER:
#   1. pip install airos-driver-<name>
#   2. Add an entry here with trusted: true and trust_level: verified
#   3. Restart AirOS — the loader will discover and conformance-check it.

drivers:

  # --------------------------------------------------------------------------
  # Risk domains — produce signals + assessments + decision packets
  # --------------------------------------------------------------------------

  air:
    builtin_class: airos.drivers.store.drivers.air_driver:AirDriver
    trust_level: core
    trusted: true
    cadence_hint: "15 minutes"
    notes: "AQICN/CPCB sensor network. Requires AQICN_API_KEY for live data."

  fire:
    builtin_class: airos.drivers.store.drivers.fire_driver:FireDriver
    trust_level: core
    trusted: true
    cadence_hint: "15 minutes"
    notes: "MODIS/VIIRS active fire data. No API key required."

  heat:
    builtin_class: airos.drivers.store.drivers.heat_driver:HeatDriver
    trust_level: core
    trusted: true
    cadence_hint: "30 minutes"
    notes: "Sentinel-2 LST + OpenMeteo. Requires GEE credentials for satellite data."

  flood:
    builtin_class: airos.drivers.store.drivers.flood_driver:FloodDriver
    trust_level: core
    trusted: true
    cadence_hint: "1 hour"
    notes: "Sentinel-2 SAR + DEM. Requires GEE credentials."

  water:
    builtin_class: airos.drivers.store.drivers.water_driver:WaterDriver
    trust_level: core
    trusted: true
    cadence_hint: "1 hour"
    notes: "Sentinel-2 spectral indices (MNDWI, NDTI, CI, FAI). Requires GEE credentials."

  waste:
    builtin_class: airos.drivers.store.drivers.waste_driver:WasteDriver
    trust_level: core
    trusted: true
    cadence_hint: "1 hour"
    notes: "Sentinel-2 spectral + MODIS fire at known dump sites."

  construction:
    builtin_class: airos.drivers.store.drivers.construction_driver:ConstructionDriver
    trust_level: core
    trusted: true
    cadence_hint: "6 hours"
    notes: "Permit API + SAR change detection."

  green:
    builtin_class: airos.drivers.store.drivers.green_driver:GreenDriver
    trust_level: core
    trusted: true
    cadence_hint: "6 hours"
    notes: "Sentinel-2 NDVI. Requires GEE credentials for full satellite data."

  noise:
    builtin_class: airos.drivers.store.drivers.noise_driver:NoiseDriver
    trust_level: core
    trusted: true
    cadence_hint: "6 hours"
    notes: "Noise sensor API. Requires NOISE_API_URL."

  crowd:
    builtin_class: airos.drivers.store.drivers.crowd_driver:CrowdDriver
    trust_level: core
    trusted: true
    cadence_hint: "15 minutes"
    notes: "CCTV observation store + camera registry. Requires observation_store.parquet."

  # --------------------------------------------------------------------------
  # Structural context domains — signals only, no assessments
  # --------------------------------------------------------------------------

  weather:
    builtin_class: airos.drivers.store.drivers.weather_driver:WeatherDriver
    trust_level: core
    trusted: true
    cadence_hint: "15 minutes"
    notes: "OpenMeteo API. No key required."

  buildings:
    builtin_class: airos.drivers.store.drivers.buildings_driver:BuildingsDriver
    trust_level: core
    trusted: true
    cadence_hint: "90 days"
    notes: "OSM Overpass API. No key required. Quarterly refresh."

  roads:
    builtin_class: airos.drivers.store.drivers.roads_driver:RoadsDriver
    trust_level: core
    trusted: true
    cadence_hint: "90 days"
    notes: "OSM Overpass API + osmnx. No key required. Quarterly refresh."

  drains:
    builtin_class: airos.drivers.store.drivers.drains_driver:DrainsDriver
    trust_level: core
    trusted: true
    cadence_hint: "90 days"
    notes: "OSM Overpass API waterways. No key required. Quarterly refresh."

  terrain:
    builtin_class: airos.drivers.store.drivers.terrain_driver:TerrainDriver
    trust_level: core
    trusted: true
    cadence_hint: "90 days"
    notes: "SRTM 30m / Copernicus DEM. No API key required. Quarterly refresh. Signals: ELEVATION_M, SLOPE_DEG, ASPECT_DEG, RUGGEDNESS_INDEX, DATA_CONFIDENCE. TERRAIN_CLASS is agent-derived."

  nightlights:
    builtin_class: airos.drivers.store.drivers.nightlights_driver:NightLightsDriver
    trust_level: core
    trusted: true
    cadence_hint: "30 days"
    notes: "VIIRS night-time light (NASA Black Marble VNP46A2). No key required for synthetic mode. Set EARTHDATA_TOKEN for real VIIRS data. Signals: NTL_RADIANCE, NTL_LIT_FRACTION, ECONOMIC_ACTIVITY_INDEX, DATA_CONFIDENCE, ACTIVITY_CLASS."

  pois:
    builtin_class: airos.drivers.store.drivers.pois_driver:POIsDriver
    trust_level: core
    trusted: true
    cadence_hint: "90 days"
    notes: "OSM Overpass POIs by category. No key required. Quarterly refresh. Signals: POI_INDUSTRIAL_COUNT, POI_CONSTRUCTION_COUNT, POI_FUEL_STATION_COUNT, POI_KILN_COUNT, POI_EATERY_COUNT, POI_CREMATORIUM_COUNT, POI_WASTE_FACILITY_COUNT, POI_MARKET_COUNT, POI_TRANSIT_TERMINAL_COUNT, POI_HOSPITAL_COUNT, POI_SCHOOL_COUNT, DATA_CONFIDENCE."

  census:
    builtin_class: airos.drivers.store.drivers.census_driver:CensusDriver
    trust_level: core
    trusted: true
    cadence_hint: "365 days"
    notes: "GHSL R2023A 100 m residential population grid (JRC, CC-BY 4.0). No API key. Yearly refresh. Signals: POPULATION, POPULATION_DENSITY_PER_KM2, VULNERABLE_POPULATION_EST, DATA_CONFIDENCE. See methodology §D.21."

