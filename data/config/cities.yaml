# City registry — add any city here to make it available for ingestion,
# the dashboard, and ward lookups.
#
# Fields
# -------
# display_name  Human-readable label shown in the dashboard.
# country       ISO 3166-1 alpha-2 country code.
# timezone      IANA timezone string (used for report timestamps).
# bbox          Bounding box in WGS84 decimal degrees.  Cover the urban
#               agglomeration including suburban areas you want to monitor.
# enabled       Set to false to disable a city without removing its entry.
#
# Adding a city
# -------------
# 1. Pick a short, lowercase, underscore-separated id (e.g. "kolkata").
# 2. Find the bbox: use https://boundingbox.klokantech.com/ (CSV format).
# 3. Add the block below and run:
#      python main.py --step ingest-h3 --cities <id> --domains terrain nightlights

cities:

  bangalore:
    display_name: "Bengaluru, India"
    country: IN
    timezone: Asia/Kolkata
    enabled: true
    bbox:
      lat_min: 12.834
