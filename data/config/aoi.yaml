# Area-of-Interest (AOI) registry. An AOI is any spatial region we
# want to monitor — a city, airshed, watershed, regional economic
# corridor, port, or any other bounded area.
#
# Cells are AOI-agnostic at storage time (Phase 0 of the AOI
# generalisation). The same H3 cell can be aggregated under multiple
# AOIs without re-ingestion — AOIs are *query lenses*, not storage
# partitions. See methodology §1.3 for the principle.
#
# Fields
# -------
# kind          city | airshed | watershed | corridor | port | airport
#               (default: city). Drives routing and default resolution.
# display_name  Human-readable label shown in the dashboard.
# country       ISO 3166-1 alpha-2 country code.
# timezone      IANA timezone string.
# bbox          Bounding box in WGS84 decimal degrees.
# resolution    H3 resolution for this AOI's primary view (5-9). If
#               omitted, auto-derived from bbox area to keep total
#               cell count between ~500 and ~3000:
#                 < 200 km²    → res 9
#                 200-2.5k km² → res 8 (city default)
#                 2.5k-25k km² → res 7
#                 25k-250k km² → res 6
#                 > 250k km²   → res 5
# member_aois   (optional) list of AOI ids this one composes; the
#               aggregator can roll up member-AOI data instead of
#               re-ingesting (Phase 2 — composition).
# enabled       Set to false to disable an AOI without removing it.
#
# Adding an AOI
# -------------
# 1. Pick a short, lowercase, underscore-separated id (e.g. "igp_north").
# 2. Find the bbox: https://boundingbox.klokantech.com/ (CSV format).
# 3. Set kind appropriately (default "city" if omitted).
# 4. Save. The scheduler picks it up on next sweep; geocoding catches
#    up automatically over the next few hours.

