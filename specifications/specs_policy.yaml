specs_first: true

mandatory_conformance:
  provider_inputs: true
  platform_objects: true
  domain_profiles: true
  consumer_outputs: true

spec_families:
  provider_contracts:
    path: specifications/provider_contracts
    required_for:
      - external_data_feed
      - sensor_feed
      - file_upload
      - edge_device_output
      - government_system_extract

  platform_objects:
    path: specifications/platform_objects
    required_for:
      - normalized_observation
      - entity
      - feature
      - event
      - asset
      - source_reliability
      - reviewer_action

  domain_specs:
    path: specifications/domain_specs
    required_for:
      - domain_variable
      - domain_threshold
      - domain_category
      - domain_feature_profile
      - domain_decision_profile
      - domain_safety_gate
      - decision_packet_extension

  consumer_contracts:
    path: specifications/consumer_contracts
    required_for:
      - dashboard_payload
      - api_response
      - sdk_response
      - decision_packet
      - map_layer
      - report
      - field_task

required_sequence:
  - define_use_case
  - identify_actor
  - identify_decision
  - define_or_reuse_provider_contract
  - define_or_reuse_platform_object
  - define_or_reuse_domain_spec
  - define_or_reuse_consumer_contract
  - register_in_manifest
  - add_conformance_check
  - implement_code
  - run_conformance
  - attach_evidence

blocked_without_specs:
  # Provider-facing capabilities
  - connector
  - edge_publisher
  - file_ingestion

  # Canonical platform surface area
  - platform_object
  - platform_object_extension
  - domain_field
  - domain_variable
  - domain_threshold
  - domain_category
  - decision_packet_extension

  # Consumer-facing capabilities
  - dashboard
  - dashboard_payload
  - sdk_method
  - api_endpoint
  - map_layer
  - report
  - public_report
  - decision_packet
  - field_task

  # Decision-support / automation surfaces
  - model_output
  - alert_rule