adapter_id: open_meteo_weather_adapter
name: Open-Meteo Weather Adapter
version: v1
status: draft_demo
adapter_type: api_connector
source_system_type: weather_feed
description: >
  Connector metadata for ingesting weather observations from an Open-Meteo-style API.
  Produces contract-shaped provider records for review-oriented AirOS workflows.
output_contracts:
  - provider_weather_observation_feed
configuration:
  required_settings:
    - base_url
    - latitude
    - longitude
  optional_settings:
    - request_timeout_seconds
    - rate_limit_per_minute
  secrets_required: false
  notes:
    - This provider is typically usable without an API key; respect rate limits and terms.
runtime:
  current_module: urban_platform/connectors/weather/hourly_archive.py
  current_function_examples:
    - fetch_hourly_weather(...)
safety:
  produces_final_decisions: false
  records_include_provenance: true
  records_include_quality_flags: true
  notes:
    - Adapter outputs are ingestion records only; they support downstream decision logic under human review.
provenance:
  publisher: air_os_repo
  source: provider_adapter_descriptor
  updated_at: "2026-05-05T00:00:00Z"

