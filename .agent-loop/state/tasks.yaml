- task_id: heat-phase2-osm-green-cover
  type: code_edit
  scope_description: 'Write an OSM green cover connector using osmnx that pulls parks,
    trees, and water bodies for a city boundary and computes green cover fraction
    and water proximity score per H3 cell.

    '
  allowed_files:
  - urban_platform/connectors/heat/osm_green_cover.py
  - tests/test_heat_osm_green_cover.py
  - docs/EXECUTION_TRACKER.md
  forbidden_actions:
  - modify specification contracts
  - modify existing connectors
  - make live OSM network calls in tests (mock osmnx)
  success_criteria:
  - osm_green_cover.py accepts a boundary polygon (shapely) and h3_resolution
  - fetches parks and green spaces using osmnx.features_from_polygon with tags for
    parks, forests, grass, trees
  - fetches water bodies with tags for water, wetland, reservoir
  - "computes green_cover_fraction per H3 cell (0.0\u20131.0)"
  - computes water_proximity_score per H3 cell (1.0 if water in cell, 0.0 if no water
    within 500m, interpolated in between)
  - returns a DataFrame with columns (h3_id, green_cover_fraction, water_proximity_score,
    osm_feature_count)
  - tests mock osmnx calls; at least one test covers a cell with full green cover
    and one with zero
  - pytest passes (537+ tests)
  - tracker updated
  escalation_conditions:
  - osmnx API for features_from_polygon has changed
  - H3 cell geometry computation requires a library not in requirements.txt
  - verification fails after two attempts
  depends_on:
  - heat-phase0-specs
  status: ready
- task_id: heat-phase3-pipeline
  type: code_edit
  scope_description: 'Write the urban heat risk scoring pipeline that combines temperature
    observations and green cover to produce an H3 heat risk grid and ranked intervention
    candidates matching the consumer contracts.

    '
  allowed_files:
  - urban_platform/applications/heat/__init__.py
  - urban_platform/applications/heat/heat_pipeline.py
  - tests/test_heat_pipeline.py
  - docs/EXECUTION_TRACKER.md
  forbidden_actions:
  - modify specification contracts
  - modify existing AQ or flood pipeline code
  - claim production readiness
  success_criteria:
  - heat_pipeline.py accepts (temperature_df, green_cover_df, h3_resolution, city_id)
    parameters
  - computes heat_index per H3 cell using IDW interpolation of temperature observations
    (reuse pattern from aq_data.py build_aq_panel)
  - computes uhi_intensity as cell heat_index minus city-wide median
  - "computes heat_risk_score per cell (0.0\u20131.0) combining uhi_intensity and\
    \ green_cover_fraction deficit"
  - build_heat_risk_dashboard() returns a dict conforming to heat_risk_dashboard.v1.schema.json
  - build_intervention_candidates() returns a dict conforming to heat_intervention_candidates.v1.schema.json
    with top-10 cells ranked by risk_score descending
  - data_quality_flag is "synthetic" if temperature data_source is synthetic
  - pytest passes (537+ tests)
  - conformance passes (148+ checks)
  - tracker updated
  escalation_conditions:
  - IDW interpolation produces NaN for all cells (insufficient temperature points)
  - consumer contract fields cannot be populated from available data
  - verification fails after two attempts
  depends_on:
  - heat-phase1-openmeteo-connector
  - heat-phase2-osm-green-cover
  status: ready
