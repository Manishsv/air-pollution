name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-conformance:
    runs-on: ubuntu-latest
    steps:
      # v5+/v6+ run on Node.js 24 (avoids Node 20 runner deprecation warnings).
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # Geo stack (geopandas/fiona/osmnx/shapely), optional GDAL-bound source builds, and headless OpenCV/X deps.
      - name: Install system packages (GDAL / GEOS / PROJ)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            proj-bin \
            proj-data \
            libspatialindex-dev \
            libglib2.0-0 \
            libgl1 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libgomp1

      # pytest is not in requirements.txt; CI and clean envs need it explicitly.
      # Always use `python -m pip` so installs land in the same interpreter as `python -m pytest`
      # (bare `pip` can target a different Python on the runner).
      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt
          python -m pip install -q pytest

      - name: Pytest
        run: python -m pytest -q

      - name: Conformance
        run: python main.py --step conformance

      - name: AI dev supervisor (conformance)
        run: python tools/ai_dev_supervisor/run_review.py --run-conformance
